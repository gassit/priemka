<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2C3E50">
    <meta name="apple-mobile-web-app-title" content="Приёмка">
    <link rel="apple-touch-icon" href="icon-192.png">

    <title>Приёмка объекта</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --bg: #F5F0EB;
            --card: #FFFFFF;
            --accent: #D35400;
            --accent-hover: #B8460A;
            --accent-light: #FDEBD0;
            --text: #2C3E50;
            --text-muted: #95A5A6;
            --border: #E8E0D8;
            --danger: #E74C3C;
            --danger-light: #FDEDEC;
            --header-bg: #2C3E50;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,0,0,0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.018) 1px, transparent 1px);
            background-size: 36px 36px;
            pointer-events: none;
            z-index: 0;
        }
        .screen {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            opacity: 0; pointer-events: none;
            transform: translateY(14px);
            transition: opacity 0.26s ease, transform 0.26s ease;
            z-index: 1;
        }
        .screen.active {
            opacity: 1; pointer-events: auto;
            transform: translateY(0); z-index: 2;
        }
        .app-header {
            background: var(--header-bg); color: white;
            padding: 0 16px; height: 56px;
            display: flex; align-items: center; gap: 10px;
            flex-shrink: 0; z-index: 10;
        }
        .app-header h1 { font-size: 17px; font-weight: 800; flex: 1; }
        .header-btn {
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; border: none;
            background: rgba(255,255,255,0.1);
            color: white; cursor: pointer;
            transition: background 0.2s;
        }
        .header-btn:active { background: rgba(255,255,255,0.25); }
        .header-icon { font-size: 20px !important; }
        .status-bar { height: 4px; background: var(--accent); flex-shrink: 0; }
        .counter-badge {
            background: var(--accent); color: white;
            font-size: 11px; font-weight: 800;
            padding: 1px 8px; border-radius: 20px;
            margin-left: 6px; vertical-align: middle;
        }
        .screen-content {
            flex: 1; overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px; padding-bottom: 88px;
        }
        .screen-content::-webkit-scrollbar { width: 3px; }
        .screen-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        @keyframes cardSlideIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .remark-card {
            background: var(--card); border-radius: 12px;
            padding: 12px; margin-bottom: 10px;
            display: flex; gap: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            border: 1px solid var(--border);
            animation: cardSlideIn 0.3s ease both;
        }
        .remark-card:active { transform: scale(0.98); box-shadow: 0 0 2px rgba(0,0,0,0.08); }
        .remark-card .thumb {
            width: 72px; height: 72px; border-radius: 8px;
            object-fit: cover; flex-shrink: 0; background: var(--bg);
        }
        .remark-card .info {
            flex: 1; min-width: 0;
            display: flex; flex-direction: column; justify-content: center;
        }
        .remark-card .num { font-size: 11px; font-weight: 700; color: var(--accent); margin-bottom: 2px; }
        .remark-card .desc {
            font-size: 14px; font-weight: 600; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .remark-card .loc {
            font-size: 12px; color: var(--text-muted); margin-top: 4px;
            display: flex; align-items: center; gap: 3px;
        }
        .remark-card .loc .material-icons-round { font-size: 14px; }
        .fab {
            position: fixed; bottom: 24px; right: 24px;
            width: 56px; height: 56px; border-radius: 16px;
            background: var(--accent); color: white; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 18px rgba(211,84,0,0.45);
            z-index: 20; transition: transform 0.2s, background 0.2s;
        }
        .fab:active { transform: scale(0.9); background: var(--accent-hover); }
        .fab .material-icons-round { font-size: 28px; }
        .form-section { margin-bottom: 18px; }
        .form-label {
            display: flex; align-items: center; gap: 6px;
            font-size: 12px; font-weight: 700; color: var(--text);
            margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .form-label .material-icons-round { font-size: 17px; color: var(--accent); }
        .form-input {
            width: 100%; padding: 11px 13px;
            border: 2px solid var(--border); border-radius: 10px;
            font-size: 15px; font-family: inherit; color: var(--text);
            background: var(--card);
            transition: border-color 0.2s, box-shadow 0.2s; outline: none;
        }
        .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(211,84,0,0.1); }
        .form-input::placeholder { color: var(--text-muted); }
        textarea.form-input { resize: vertical; min-height: 76px; }
        .photo-block {
            border: 2px dashed var(--border); border-radius: 12px;
            padding: 28px; text-align: center; cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            position: relative; overflow: hidden;
        }
        .photo-block:active { border-color: var(--accent); background: var(--accent-light); }
        .photo-block.has-photo { padding: 0; border-style: solid; border-color: var(--border); }
        .photo-block.has-photo:active { border-color: var(--accent); }
        .photo-block img {
            width: 100%; height: 200px;
            object-fit: cover; display: block; border-radius: 10px;
        }
        .photo-overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.45);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.2s; border-radius: 10px;
        }
        .photo-block.has-photo:active .photo-overlay { opacity: 1; }
        .photo-overlay span { color: white; font-weight: 700; font-size: 14px; }
        .photo-placeholder {
            display: flex; flex-direction: column;
            align-items: center; gap: 8px; color: var(--text-muted);
        }
        .photo-placeholder .material-icons-round { font-size: 40px; color: var(--accent); }
        .photo-placeholder span { font-size: 14px; font-weight: 600; }
        .photo-alt {
            margin-top: 6px; font-size: 12px; color: var(--text-muted);
            cursor: pointer; text-align: center;
        }
        .photo-alt:active { color: var(--accent); }
        .save-btn {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            background: var(--accent); color: white;
            font-size: 16px; font-weight: 800; font-family: inherit;
            cursor: pointer; transition: background 0.2s, transform 0.15s; margin-top: 4px;
        }
        .save-btn:active { transform: scale(0.98); background: var(--accent-hover); }
        .detail-photo {
            width: 100%; border-radius: 12px; margin-bottom: 14px;
            display: block; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .detail-field {
            background: var(--card); border-radius: 10px;
            padding: 13px 14px; margin-bottom: 8px; border: 1px solid var(--border);
        }
        .detail-field .label {
            font-size: 11px; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px;
            display: flex; align-items: center; gap: 4px;
        }
        .detail-field .label .material-icons-round { font-size: 14px; }
        .detail-field .value { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.45; }
        .detail-actions { display: flex; gap: 10px; margin-top: 18px; }
        .detail-actions button {
            flex: 1; padding: 12px; border-radius: 10px; border: none;
            font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            transition: transform 0.15s;
        }
        .detail-actions button:active { transform: scale(0.97); }
        .btn-edit { background: var(--accent-light); color: var(--accent); }
        .btn-delete { background: var(--danger-light); color: var(--danger); }
        .empty-state {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 60px 20px; text-align: center;
        }
        .empty-state .material-icons-round { font-size: 60px; color: var(--border); margin-bottom: 14px; }
        .empty-state p { font-size: 15px; color: var(--text-muted); font-weight: 600; line-height: 1.5; }
        .toast {
            position: fixed; bottom: 28px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--header-bg); color: white;
            padding: 11px 22px; border-radius: 10px;
            font-size: 13px; font-weight: 600; z-index: 100;
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            white-space: nowrap; box-shadow: 0 4px 18px rgba(0,0,0,0.22);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            z-index: 50; display: flex; align-items: center; justify-content: center;
            padding: 24px; opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-box {
            background: var(--card); border-radius: 16px;
            padding: 24px; max-width: 310px; width: 100%; text-align: center;
        }
        .modal-box h3 { font-size: 17px; font-weight: 800; margin-bottom: 6px; }
        .modal-box p { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btns button {
            flex: 1; padding: 10px; border-radius: 10px; border: none;
            font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer;
        }
        .modal-cancel { background: var(--bg); color: var(--text); }
        .modal-confirm { background: var(--danger); color: white; }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>

    <div id="screen-list" class="screen active">
        <div class="status-bar"></div>
        <header class="app-header">
            <span class="material-icons-round header-icon" style="color:var(--accent)">construction</span>
            <h1 id="list-title">Приёмка объекта</h1>
            <button class="header-btn" id="btn-export" aria-label="Выгрузить в DOC">
                <span class="material-icons-round header-icon">download</span>
            </button>
        </header>
        <div class="screen-content" id="list-content"></div>
        <button class="fab" id="btn-add" aria-label="Добавить замечание">
            <span class="material-icons-round">add</span>
        </button>
    </div>

    <div id="screen-form" class="screen">
        <div class="status-bar"></div>
        <header class="app-header">
            <button class="header-btn" id="btn-form-back" aria-label="Назад">
                <span class="material-icons-round header-icon">arrow_back</span>
            </button>
            <h1 id="form-title">Новое замечание</h1>
        </header>
        <div class="screen-content">
            <form id="remark-form" autocomplete="off">
                <div class="form-section">
                    <label class="form-label">
                        <span class="material-icons-round">photo_camera</span> Фотография
                    </label>
                    <div class="photo-block" id="photo-block">
                        <div class="photo-placeholder" id="photo-placeholder">
                            <span class="material-icons-round">add_a_photo</span>
                            <span>Снять или выбрать фото</span>
                        </div>
                        <div class="photo-overlay"><span>Переснять</span></div>
                    </div>
                    <div class="photo-alt" id="photo-gallery-link">или выбрать из галереи</div>
                    <input type="file" id="input-camera" accept="image/*" capture="environment" hidden>
                    <input type="file" id="input-gallery" accept="image/*" hidden>
                </div>
                <div class="form-section">
                    <label class="form-label" for="input-desc">
                        <span class="material-icons-round">report_problem</span> Описание нарушения
                    </label>
                    <textarea class="form-input" id="input-desc" placeholder="Опишите выявленное нарушение..." rows="3"></textarea>
                </div>
                <div class="form-section">
                    <label class="form-label" for="input-loc">
                        <span class="material-icons-round">place</span> Место обнаружения
                    </label>
                    <input class="form-input" id="input-loc" type="text" placeholder="Этаж, помещение, зона...">
                </div>
                <div class="form-section">
                    <label class="form-label" for="input-norm">
                        <span class="material-icons-round">gavel</span> Нормативный документ
                    </label>
                    <input class="form-input" id="input-norm" type="text" placeholder="СП, ГОСТ, СНиП, пункт...">
                </div>
                <button type="submit" class="save-btn" id="btn-save">Сохранить</button>
            </form>
        </div>
    </div>

    <div id="screen-detail" class="screen">
        <div class="status-bar"></div>
        <header class="app-header">
            <button class="header-btn" id="btn-detail-back" aria-label="Назад">
                <span class="material-icons-round header-icon">arrow_back</span>
            </button>
            <h1 id="detail-title">Замечание</h1>
        </header>
        <div class="screen-content" id="detail-content"></div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="modal-overlay" id="delete-modal">
        <div class="modal-box">
            <h3>Удалить замечание?</h3
