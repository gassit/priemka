<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Журнал замечаний</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f5f5f5; color: #333; }
        .header { background: #2c3e50; color: white; padding: 15px; text-align: center; font-size: 18px; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { display: inline-block; padding: 10px 15px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; margin-right: 5px; margin-bottom: 5px; font-size: 14px; }
        .btn-danger { background: #e74c3c; }
        .btn-success { background: #27ae60; }
        .btn-block { display: block; width: 100%; text-align: center; box-sizing: border-box; }
        textarea { width: 100%; box-sizing: border-box; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; font-family: inherit; resize: vertical; }
        .photos-preview { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .photos-preview img { width: 80px; height: 80px; object-fit: cover; border-radius: 5px; border: 1px solid #ddd; }
        .hidden { display: none !important; }
        #spinner { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; justify-content: center; align-items: center; z-index: 9999; font-size: 20px; color: #2c3e50; }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 5px; opacity: 0; transition: opacity 0.3s; z-index: 10000; }
        .meta { font-size: 12px; color: #888; margin-bottom: 8px; }
    </style>
</head>
<body>

    <div id="spinner">Загрузка данных...</div>
    <div id="toast"></div>

    <div class="header">Журнал замечаний</div>
    
    <div class="container">
        <!-- ЭКРАН СПИСКА -->
        <div id="screen-list">
            <button class="btn btn-success btn-block" onclick="openForm()">+ Добавить замечание</button>
            <button class="btn btn-block" style="background:#f39c12;" onclick="exportToHtml()">Экспорт в HTML</button>
            <div id="list-container"></div>
        </div>

        <!-- ЭКРАН ФОРМЫ -->
        <div id="screen-form" class="hidden">
            <div class="card">
                <textarea id="remarkText" rows="4" placeholder="Описание замечания..."></textarea>
                
                <label style="display:block; margin-bottom:10px; cursor:pointer;">
                    <span class="btn" style="background:#95a5a6;">Прикрепить фото</span>
                    <!-- Добавлена возможность загрузки нескольких фотографий -->
                    <input type="file" id="photoInput" accept="image/*" multiple style="display: none;">
                </label>
                
                <div id="photoPreviews" class="photos-preview"></div>

                <div style="margin-top: 15px;">
                    <button class="btn btn-success" onclick="saveRemark()">Сохранить</button>
                    <button class="btn btn-danger" onclick="showScreen('list')">Отмена</button>
                </div>
            </div>
        </div>
    </div>

<script>
var DB_NAME='RemarksDB', STORE='remarks', db, remarks=[], currentEditId=null;

// ИНИЦИАЛИЗАЦИЯ БАЗЫ ДАННЫХ (Исправлена критическая ошибка r.success -> r.onsuccess)
function openDB(){return new Promise(function(res,rej){var r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=function(e){e.target.result.createObjectStore(STORE,{keyPath:'id'});};r.onsuccess=function(e){db=e.target.result;res();};r.onerror=function(){rej(r.error);};});}
function dbGetAll(){return new Promise(function(res,rej){var tx=db.transaction(STORE,'readonly'),r=tx.objectStore(STORE).getAll();tx.oncomplete=function(){res(r.result);};r.onerror=function(){rej(r.error);};});}
function dbPut(item){return new Promise(function(res,rej){var tx=db.transaction(STORE,'readwrite'),r=tx.objectStore(STORE).put(item);tx.oncomplete=function(){res();};r.onerror=function(){rej(r.error);};});}

// 1 ФРАГМЕНТ: Функция dbDelete (строка ~ после dbClear)
function dbDelete(id){return new Promise(function(res,rej){var tx=db.transaction(STORE,'readwrite'),r=tx.objectStore(STORE).delete(id);tx.oncomplete=function(){res();};r.onerror=function(){rej(r.error);};});}

function showScreen(name){
    document.getElementById('screen-list').classList.toggle('hidden', name!=='list');
    document.getElementById('screen-form').classList.toggle('hidden', name!=='form');
    if(name==='list') renderList();
}

function renderList(){
    var c=document.getElementById('list-container'); c.innerHTML='';
    if(remarks.length===0){c.innerHTML='<p style="text-align:center;color:#888;margin-top:20px;">Замечаний нет</p>';return;}
    remarks.slice().reverse().forEach(function(r){
        var photos=(r.photos||[]);
        var thumbHtml='';
        if(photos.length>0){
            thumbHtml='<div class="photos-preview">';
            // Показываем все прикрепленные фото маленькими превью
            for(var i=0; i<photos.length; i++){thumbHtml+='<img src="'+photos[i]+'" alt="photo">';}
            thumbHtml+='</div>';
        }
        c.innerHTML+='<div class="card">'+
            '<div class="meta">#'+r.id+' | '+r.date+'</div>'+
            '<p style="margin:0 0 10px 0;">'+r.text+'</p>'+
            thumbHtml+
            '<button class="btn" onclick="openForm('+r.id+')">Редактировать</button>'+
            '<button class="btn btn-danger" onclick="deleteRemark('+r.id+')">Удалить</button>'+
            '</div>';
    });
}

function openForm(id){
    currentEditId=id||null;
    document.getElementById('remarkText').value='';
    document.getElementById('photoInput').value='';
    document.getElementById('photoPreviews').innerHTML='';
    
    if(id){
        var r=remarks.find(x=>x.id===id);
        if(r){
            document.getElementById('remarkText').value=r.text;
            renderFormPreviews(r.photos||[]);
        }
    }
    showScreen('form');
}

// Отрисовка превью уже загруженных фото при редактировании
function renderFormPreviews(photos){
    var c=document.getElementById('photoPreviews'); c.innerHTML='';
    photos.forEach(function(p){ c.innerHTML+='<img src="'+p+'" alt="photo">'; });
}

// Чтение множества файлов
function readFileAsDataURL(file){return new Promise(function(res,rej){var fr=new FileReader();fr.onload=function(e){res(e.target.result);};fr.onerror=function(){rej(fr.error);};fr.readAsDataURL(file);});}

function saveRemark(){
    var text=document.getElementById('remarkText').value.trim();
    if(!text) return showToast('Введите описание замечания');
    
    var files=document.getElementById('photoInput').files;
    var existingPhotos=currentEditId?(remarks.find(x=>x.id===currentEditId).photos||[]):[];
    
    if(files.length>0){
        var promises=[];
        for(var i=0;i<files.length;i++) promises.push(readFileAsDataURL(files[i]));
        
        Promise.all(promises).then(function(newPhotos){
            finishSave(text, existingPhotos.concat(newPhotos));
        }).catch(function(){showToast('Ошибка чтения файлов');});
    } else {
        finishSave(text, existingPhotos);
    }
}

function finishSave(text, photos){
    if(currentEditId){
        var r=remarks.find(x=>x.id===currentEditId);
        r.text=text; r.photos=photos;
        dbPut(r).then(function(){showToast('Замечание обновлено');showScreen('list');}).catch(function(){showToast('Ошибка сохранения');});
    } else {
        var ni={id:Date.now(), text:text, photos:photos, date:new Date().toLocaleString()};
        remarks.push(ni);
        
        // 2 ФРАГМЕНТ: В saveRemark (в блоке else нового замечания)
        dbPut(ni).then(function(){showToast('Замечание #'+remarks.length+' добавлено');showScreen('list');}).catch(function(){remarks.pop();showToast('Ошибка сохранения');});
    }
}

function deleteRemark(id){
    if(!confirm('Удалить замечание?')) return;
    remarks=remarks.filter(x=>x.id!==id);
    dbDelete(id).then(function(){showToast('Удалено');renderList();}).catch(function(){showToast('Ошибка удаления');});
}

function exportToHtml(){
    if(remarks.length===0) return showToast('Нет данных для экспорта');
    var html='<html><head><meta charset="utf-8"><title>Замечания</title></head><body><h1>Журнал замечаний</h1>';
    remarks.forEach(function(r){
        var photos=r.photos||[];
        
        // 3 ФРАГМЕНТ: В exportToHtml (переменная ph)
        var ph=photos.length>0?'<img src="'+photos[0]+'" style="max-width:200px;width:100%;border:1px solid #aaa;display:block;margin:0 auto;"/>'+(photos.length>1?'<div style="font-size:8pt;text-align:center;color:#888;margin-top:2px;">ещё '+(photos.length-1)+'</div>':'') :'—';
        
        html+='<div style="border:1px solid #ccc;margin:10px 0;padding:10px;">';
        html+='<b>'+r.date+'</b><br><p>'+r.text+'</p>'+ph;
        html+='</div>';
    });
    html+='</body></html>';
    
    var blob=new Blob([html],{type:'text/html'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='remarks.html';
    a.click();
    URL.revokeObjectURL(a.href);
}

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.opacity=1;setTimeout(function(){t.style.opacity=0;},2000);}

// 4 ФРАГМЕНТ: В HTML (кнопка сохранения в форме) - реализована в виде:
// <button class="btn btn-success" onclick="saveRemark()">Сохранить</button>

// ЗАПУСК
openDB().then(function(){
    return dbGetAll();
}).then(function(data){
    remarks=data;
    showScreen('list');
    document.getElementById('spinner').style.display='none';
}).catch(function(e){
    console.error(e);
    document.getElementById('spinner').innerHTML='Ошибка инициализации: '+e;
});
</script>
</body>
</html>
