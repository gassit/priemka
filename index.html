<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2C3E50">
    <meta name="apple-mobile-web-app-title" content="Приёмка">
    <link rel="apple-touch-icon" href="icon-192.png">

    <title>Приёмка объекта</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --bg: #F5F0EB;
            --card: #FFFFFF;
            --accent: #D35400;
            --accent-hover: #B8460A;
            --accent-light: #FDEBD0;
            --text: #2C3E50;
            --text-muted: #95A5A6;
            --border: #E8E0D8;
            --danger: #E74C3C;
            --danger-light: #FDEDEC;
            --header-bg: #2C3E50;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,0,0,0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.018) 1px, transparent 1px);
            background-size: 36px 36px;
            pointer-events: none;
            z-index: 0;
        }
        .screen {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            opacity: 0; pointer-events: none;
            transform: translateY(14px);
            transition: opacity 0.26s ease, transform 0.26s ease;
            z-index: 1;
        }
        .screen.active {
            opacity: 1; pointer-events: auto;
            transform: translateY(0); z-index: 2;
        }
        .app-header {
            background: var(--header-bg); color: white;
            padding: 0 16px; height: 56px;
            display: flex; align-items: center; gap: 10px;
            flex-shrink: 0; z-index: 10;
        }
        .app-header h1 { font-size: 17px; font-weight: 800; flex: 1; }
        .header-btn {
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; border: none;
            background: rgba(255,255,255,0.1);
            color: white; cursor: pointer;
            transition: background 0.2s;
        }
        .header-btn:active { background: rgba(255,255,255,0.25); }
        .header-icon { font-size: 20px !important; }
        .status-bar { height: 4px; background: var(--accent); flex-shrink: 0; }
        .counter-badge {
            background: var(--accent); color: white;
            font-size: 11px; font-weight: 800;
            padding: 1px 8px; border-radius: 20px;
            margin-left: 6px; vertical-align: middle;
        }
        .screen-content {
            flex: 1; overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px; padding-bottom: 88px;
        }
        .screen-content::-webkit-scrollbar { width: 3px; }
        .screen-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        @keyframes cardSlideIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .remark-card {
            background: var(--card); border-radius: 12px;
            padding: 12px; margin-bottom: 10px;
            display: flex; gap: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            border: 1px solid var(--border);
            animation: cardSlideIn 0.3s ease both;
        }
        .remark-card:active { transform: scale(0.98); box-shadow: 0 0 2px rgba(0,0,0,0.08); }
        .remark-card .thumb {
            width: 72px; height: 72px; border-radius: 8px;
            object-fit: cover; flex-shrink: 0; background: var(--bg);
        }
        .remark-card .info {
            flex: 1; min-width: 0;
            display: flex; flex-direction: column; justify-content: center;
        }
        .remark-card .num { font-size: 11px; font-weight: 700; color: var(--accent); margin-bottom: 2px; }
        .remark-card .desc {
            font-size: 14px; font-weight: 600; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .remark-card .loc {
            font-size: 12px; color: var(--text-muted); margin-top: 4px;
            display: flex; align-items: center; gap: 3px;
        }
        .remark-card .loc .material-icons-round { font-size: 14px; }
        .fab {
            position: fixed; bottom: 24px; right: 24px;
            width: 56px; height: 56px; border-radius: 16px;
            background: var(--accent); color: white; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 18px rgba(211,84,0,0.45);
            z-index: 20; transition: transform 0.2s, background 0.2s;
        }
        .fab:active { transform: scale(0.9); background: var(--accent-hover); }
        .fab .material-icons-round { font-size: 28px; }
        .form-section { margin-bottom: 18px; }
        .form-label {
            display: flex; align-items: center; gap: 6px;
            font-size: 12px; font-weight: 700; color: var(--text);
            margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .form-label .material-icons-round { font-size: 17px; color: var(--accent); }
        .form-input {
            width: 100%; padding: 11px 13px;
            border: 2px solid var(--border); border-radius: 10px;
            font-size: 15px; font-family: inherit; color: var(--text);
            background: var(--card);
            transition: border-color 0.2s, box-shadow 0.2s; outline: none;
        }
        .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(211,84,0,0.1); }
        .form-input::placeholder { color: var(--text-muted); }
        textarea.form-input { resize: vertical; min-height: 76px; }
        .photo-block {
            border: 2px dashed var(--border); border-radius: 12px;
            padding: 28px; text-align: center; cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            position: relative; overflow: hidden;
        }
        .photo-block:active { border-color: var(--accent); background: var(--accent-light); }
        .photo-block.has-photo { padding: 0; border-style: solid; border-color: var(--border); }
        .photo-block.has-photo:active { border-color: var(--accent); }
        .photo-block img {
            width: 100%; height: 200px;
            object-fit: cover; display: block; border-radius: 10px;
        }
        .photo-overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.45);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.2s; border-radius: 10px;
        }
        .photo-block.has-photo:active .photo-overlay { opacity: 1; }
        .photo-overlay span { color: white; font-weight: 700; font-size: 14px; }
        .photo-placeholder {
            display: flex; flex-direction: column;
            align-items: center; gap: 8px; color: var(--text-muted);
        }
        .photo-placeholder .material-icons-round { font-size: 40px; color: var(--accent); }
        .photo-placeholder span { font-size: 14px; font-weight: 600; }
        .photo-alt {
            margin-top: 6px; font-size: 12px; color: var(--text-muted);
            cursor: pointer; text-align: center;
        }
        .photo-alt:active { color: var(--accent); }
        .save-btn {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            background: var(--accent); color: white;
            font-size: 16px; font-weight: 800; font-family: inherit;
            cursor: pointer; transition: background 0.2s, transform 0.15s; margin-top: 4px;
        }
        .save-btn:active { transform: scale(0.98); background: var(--accent-hover); }
        .detail-photo {
            width: 100%; border-radius: 12px; margin-bottom: 14px;
            display: block; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .detail-field {
            background: var(--card); border-radius: 10px;
            padding: 13px 14px; margin-bottom: 8px; border: 1px solid var(--border);
        }
        .detail-field .label {
            font-size: 11px; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px;
            display: flex; align-items: center; gap: 4px;
        }
        .detail-field .label .material-icons-round { font-size: 14px; }
        .detail-field .value { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.45; }
        .detail-actions { display: flex; gap: 10px; margin-top: 18px; }
        .detail-actions button {
            flex: 1; padding: 12px; border-radius: 10px; border: none;
            font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            transition: transform 0.15s;
        }
        .detail-actions button:active { transform: scale(0.97); }
        .btn-edit { background: var(--accent-light); color: var(--accent); }
        .btn-delete { background: var(--danger-light); color: var(--danger); }
        .empty-state {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 60px 20px; text-align: center;
        }
        .empty-state .material-icons-round { font-size: 60px; color: var(--border); margin-bottom: 14px; }
        .empty-state p { font-size: 15px; color: var(--text-muted); font-weight: 600; line-height: 1.5; }
        .toast {
            position: fixed; bottom: 28px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--header-bg); color: white;
            padding: 11px 22px; border-radius: 10px;
            font-size: 13px; font-weight: 600; z-index: 100;
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            white-space: nowrap; box-shadow: 0 4px 18px rgba(0,0,0,0.22);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            z-index: 50; display: flex; align-items: center; justify-content: center;
            padding: 24px; opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-box {
            background: var(--card); border-radius: 16px;
            padding: 24px; max-width: 310px; width: 100%; text-align: center;
        }
        .modal-box h3 { font-size: 17px; font-weight: 800; margin-bottom: 6px; }
        .modal-box p { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btns button {
            flex: 1; padding: 10px; border-radius: 10px; border: none;
            font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer;
        }
        .modal-cancel { background: var(--bg); color: var(--text); }
        .modal-confirm { background: var(--danger); color: white; }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>

    <!-- Список -->
    <div id="screen-list" class="screen active">
        <div class="status-bar"></div>
        <header class="app-header">
            <span class="material-icons-round header-icon" style="color:var(--accent)">construction</span>
            <h1 id="list-title">Приёмка объекта</h1>
            <button class="header-btn" id="btn-export" aria-label="Выгрузить в DOC">
                <span class="material-icons-round header-icon">download</span>
            </button>
        </header>
        <div class="screen-content" id="list-content"></div>
        <button class="fab" id="btn-add" aria-label="Добавить замечание">
            <span class="material-icons-round">add</span>
        </button>
    </div>

    <!-- Форма -->
    <div id="screen-form" class="screen">
        <div class="status-bar"></div>
        <header class="app-header">
            <button class="header-btn" id="btn-form-back" aria-label="Назад">
                <span class="material-icons-round header-icon">arrow_back</span>
            </button>
            <h1 id="form-title">Новое замечание</h1>
        </header>
        <div class="screen-content">
            <form id="remark-form" autocomplete="off">
                <div class="form-section">
                    <label class="form-label">
                        <span class="material-icons-round">photo_camera</span> Фотография
                    </label>
                    <div class="photo-block" id="photo-block">
                        <div class="photo-placeholder" id="photo-placeholder">
                            <span class="material-icons-round">add_a_photo</span>
                            <span>Снять или выбрать фото</span>
                        </div>
                        <div class="photo-overlay"><span>Переснять</span></div>
                    </div>
                    <div class="photo-alt" id="photo-gallery-link">или выбрать из галереи</div>
                    <input type="file" id="input-camera" accept="image/*" capture="environment" hidden>
                    <input type="file" id="input-gallery" accept="image/*" hidden>
                </div>
                <div class="form-section">
                    <label class="form-label" for="input-desc">
                        <span class="material-icons-round">report_problem</span> Описание нарушения
                    </label>
                    <textarea class="form-input" id="input-desc" placeholder="Опишите выявленное нарушение..." rows="3"></textarea>
                </div>
                <div class="form-section">
                    <label class="form-label" for="input-loc">
                        <span class="material-icons-round">place</span> Место обнаружения
                    </label>
                    <input class="form-input" id="input-loc" type="text" placeholder="Этаж, помещение, зона...">
                </div>
                <div class="form-section">
                    <label class="form-label" for="input-norm">
                        <span class="material-icons-round">gavel</span> Нормативный документ
                    </label>
                    <input class="form-input" id="input-norm" type="text" placeholder="СП, ГОСТ, СНиП, пункт...">
                </div>
                <button type="submit" class="save-btn" id="btn-save">Сохранить</button>
            </form>
        </div>
    </div>

    <!-- Детали -->
    <div id="screen-detail" class="screen">
        <div class="status-bar"></div>
        <header class="app-header">
            <button class="header-btn" id="btn-detail-back" aria-label="Назад">
                <span class="material-icons-round header-icon">arrow_back</span>
            </button>
            <h1 id="detail-title">Замечание</h1>
        </header>
        <div class="screen-content" id="detail-content"></div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="modal-overlay" id="delete-modal">
        <div class="modal-box">
            <h3>Удалить замечание?</h3>
            <p>Действие нельзя будет отменить</p>
            <div class="modal-btns">
                <button class="modal-cancel" id="btn-modal-cancel">Отмена</button>
                <button class="modal-confirm" id="btn-modal-confirm">Удалить</button>
            </div>
        </div>
    </div>

    <script>
        /* Регистрация Service Worker */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js').catch(function() {});
            });
        }

        /* Состояние */
        var remarks = [];
        var editingId = null;
        var currentPhoto = null;
        var deleteTargetId = null;

        /* DOM */
        var $ = function(id) { return document.getElementById(id); };
        var screenList = $('screen-list');
        var screenForm = $('screen-form');
        var screenDetail = $('screen-detail');
        var listContent = $('list-content');
        var detailContent = $('detail-content');
        var listTitle = $('list-title');
        var formTitle = $('form-title');
        var detailTitleEl = $('detail-title');
        var remarkForm = $('remark-form');
        var photoBlock = $('photo-block');
        var photoPlaceholder = $('photo-placeholder');
        var inputCamera = $('input-camera');
        var inputGallery = $('input-gallery');
        var inputDesc = $('input-desc');
        var inputLoc = $('input-loc');
        var inputNorm = $('input-norm');
        var btnSave = $('btn-save');
        var toastEl = $('toast');
        var deleteModal = $('delete-modal');
        var fabBtn = $('btn-add');

        /* Утилиты */
        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            clearTimeout(showToast._t);
            showToast._t = setTimeout(function() { toastEl.classList.remove('show'); }, 2400);
        }

        function formatDate(iso) {
            return new Date(iso).toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        function esc(text) {
            var d = document.createElement('div');
            d.textContent = text || '';
            return d.innerHTML;
        }

        function compressImage(file, callback) {
            var reader = new FileReader();
            reader.onerror = function() { callback(null); };
            reader.onload = function(e) {
                var img = new Image();
                img.onerror = function() { callback(null); };
                img.onload = function() {
                    var MAX = 800, w = img.width, h = img.height;
                    if (w > MAX || h > MAX) {
                        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
                        else { w = Math.round(w * MAX / h); h = MAX; }
                    }
                    var c = document.createElement('canvas');
                    c.width = w; c.height = h;
                    c.getContext('2d').drawImage(img, 0, 0, w, h);
                    callback(c.toDataURL('image/jpeg', 0.6));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        /* Хранилище */
        function saveToStorage() {
            try { localStorage.setItem('obj_remarks', JSON.stringify(remarks)); }
            catch (e) { showToast('Хранилище переполнено — удалите часть замечаний'); }
        }

        function loadFromStorage() {
            try { var d = localStorage.getItem('obj_remarks'); if (d) remarks = JSON.parse(d); }
            catch (e) { remarks = []; }
        }

        /* Навигация */
        function showScreen(name) {
            screenList.classList.remove('active');
            screenForm.classList.remove('active');
            screenDetail.classList.remove('active');
            fabBtn.style.display = (name === 'list') ? 'flex' : 'none';
            if (name === 'list') { screenList.classList.add('active'); renderList(); }
            else if (name === 'form') { screenForm.classList.add('active'); }
            else if (name === 'detail') { screenDetail.classList.add('active'); }
        }

        /* Список */
        function renderList() {
            if (remarks.length > 0) {
                listTitle.innerHTML = 'Приёмка объекта <span class="counter-badge">' + remarks.length + '</span>';
            } else {
                listTitle.textContent = 'Приёмка объекта';
            }
            if (remarks.length === 0) {
                listContent.innerHTML = '<div class="empty-state"><span class="material-icons-round">assignment_late</span><p>Замечаний пока нет<br>Нажмите <strong>+</strong> для добавления</p></div>';
                return;
            }
            var html = '';
            for (var i = 0; i < remarks.length; i++) {
                var r = remarks[i];
                html += '<div class="remark-card" data-id="' + r.id + '" style="animation-delay:' + (i * 40) + 'ms">'
                    + '<img class="thumb" src="' + r.photo + '" alt="Фото" loading="lazy">'
                    + '<div class="info"><div class="num">Замечание #' + (i + 1) + '</div>'
                    + '<div class="desc">' + esc(r.description) + '</div>'
                    + '<div class="loc"><span class="material-icons-round">place</span>' + esc(r.location) + '</div></div></div>';
            }
            listContent.innerHTML = html;
            var cards = listContent.querySelectorAll('.remark-card');
            for (var j = 0; j < cards.length; j++) {
                (function(card) {
                    card.addEventListener('click', function() { openDetail(+card.dataset.id); });
                })(cards[j]);
            }
        }

        /* Детали */
        function openDetail(id) {
            var idx = -1;
            for (var i = 0; i < remarks.length; i++) { if (remarks[i].id === id) { idx = i; break; } }
            if (idx < 0) return;
            var r = remarks[idx];
            detailTitleEl.textContent = 'Замечание #' + (idx + 1);
            detailContent.innerHTML = '<img class="detail-photo" src="' + r.photo + '" alt="Фото замечания">'
                + '<div class="detail-field"><div class="label"><span class="material-icons-round">report_problem</span>Описание нарушения</div><div class="value">' + esc(r.description) + '</div></div>'
                + '<div class="detail-field"><div class="label"><span class="material-icons-round">place</span>Место обнаружения</div><div class="value">' + esc(r.location) + '</div></div>'
                + '<div class="detail-field"><div class="label"><span class="material-icons-round">gavel</span>Нормативный документ</div><div class="value">' + (esc(r.normative) || '—') + '</div></div>'
                + '<div class="detail-field"><div class="label"><span class="material-icons-round">calendar_today</span>Дата фиксации</div><div class="value">' + formatDate(r.createdAt) + '</div></div>'
                + '<div class="detail-actions"><button class="btn-edit" id="btn-edit-r"><span class="material-icons-round" style="font-size:18px">edit</span>Редактировать</button>'
                + '<button class="btn-delete" id="btn-del-r"><span class="material-icons-round" style="font-size:18px">delete</span>Удалить</button></div>';
            $('btn-edit-r').addEventListener('click', function() { openEditForm(id); });
            $('btn-del-r').addEventListener('click', function() { deleteTargetId = id; deleteModal.classList.add('show'); });
            showScreen('detail');
        }

        /* Форма: добавить */
        function openAddForm() {
            editingId = null; currentPhoto = null;
            formTitle.textContent = 'Новое замечание';
            btnSave.textContent = 'Сохранить';
            resetForm(); showScreen('form');
        }

        /* Форма: редактировать */
        function openEditForm(id) {
            var r = null;
            for (var i = 0; i < remarks.length; i++) { if (remarks[i].id === id) { r = remarks[i]; break; } }
            if (!r) return;
            editingId = id; currentPhoto = r.photo;
            formTitle.textContent = 'Редактирование';
            btnSave.textContent = 'Обновить';
            inputDesc.value = r.description;
            inputLoc.value = r.location;
            inputNorm.value = r.normative;
            photoBlock.classList.add('has-photo');
            photoPlaceholder.style.display = 'none';
            var img = photoBlock.querySelector('img');
            if (!img) { img = document.createElement('img'); img.alt = 'Фото'; photoBlock.insertBefore(img, photoBlock.querySelector('.photo-overlay')); }
            img.src = r.photo;
            showScreen('form');
        }

        function resetForm() {
            inputDesc.value = ''; inputLoc.value = ''; inputNorm.value = '';
            currentPhoto = null;
            photoBlock.classList.remove('has-photo');
            photoPlaceholder.style.display = '';
            var img = photoBlock.querySelector('img');
            if (img) img.remove();
        }

        function setPhotoPreview(base64) {
            currentPhoto = base64;
            photoBlock.classList.add('has-photo');
            photoPlaceholder.style.display = 'none';
            var img = photoBlock.querySelector('img');
            if (!img) { img = document.createElement('img'); img.alt = 'Фото'; photoBlock.insertBefore(img, photoBlock.querySelector('.photo-overlay')); }
            img.src = base64;
        }

        /* Сохранить */
        function saveRemark() {
            var desc = inputDesc.value.trim();
            var loc = inputLoc.value.trim();
            var norm = inputNorm.value.trim();
            if (!currentPhoto) { showToast('Добавьте фотографию'); return; }
            if (!desc) { showToast('Укажите описание нарушения'); inputDesc.focus(); return; }
            if (!loc) { showToast('Укажите место обнаружения'); inputLoc.focus(); return; }
            if (editingId !== null) {
                for (var i = 0; i < remarks.length; i++) {
                    if (remarks[i].id === editingId) {
                        remarks[i].photo = currentPhoto;
                        remarks[i].description = desc;
                        remarks[i].location = loc;
                        remarks[i].normative = norm;
                        break;
                    }
                }
                showToast('Замечание обновлено');
            } else {
                remarks.push({ id: Date.now(), photo: currentPhoto, description: desc, location: loc, normative: norm, createdAt: new Date().toISOString() });
                showToast('Замечание добавлено');
            }
            saveToStorage(); showScreen('list');
        }

        /* Удалить */
        function deleteRemark(id) {
            var filtered = [];
            for (var i = 0; i < remarks.length; i++) { if (remarks[i].id !== id) filtered.push(remarks[i]); }
            remarks = filtered;
            saveToStorage(); showToast('Замечание удалено'); showScreen('list');
        }

        /* Выгрузка DOC */
        function exportToDoc() {
            if (remarks.length === 0) { showToast('Нет замечаний для выгрузки'); return; }
            var dateStr = new Date().toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
            var rows = '';
            for (var i = 0; i < remarks.length; i++) {
                var r = remarks[i];
                rows += '<tr>'
                    + '<td style="width:28px;text-align:center;vertical-align:top;font-weight:bold;">' + (i + 1) + '</td>'
                    + '<td style="width:110px;text-align:center;vertical-align:top;"><img src="' + r.photo + '" width="100" style="border:1px solid #ccc;"/></td>'
                    + '<td style="vertical-align:top;">' + esc(r.description) + '</td>'
                    + '<td style="width:110px;vertical-align:top;">' + esc(r.location) + '</td>'
                    + '<td style="width:120px;vertical-align:top;font-size:10pt;">' + (esc(r.normative) || '—') + '</td>'
                    + '<td style="width:72px;text-align:center;vertical-align:top;font-size:10pt;">' + formatDate(r.createdAt) + '</td></tr>';
            }
            var doc = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">'
                + '<head><meta charset="utf-8"><xml><w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom></w:WordDocument></xml>'
                + '<style>@page{size:landscape;margin:15mm}body{font-family:Times New Roman,serif;font-size:12pt}table{border-collapse:collapse;width:100%}td,th{border:1px solid #333;padding:5px 6px;vertical-align:top}th{background-color:#D35400;color:white;font-size:10pt;font-weight:bold;text-align:center}h2{text-align:center;font-size:14pt;margin-bottom:4px}.sub{text-align:center;font-size:11pt;color:#666;margin-bottom:14px}.sig td{border:none;padding:10px 16px;width:50%}</style></head>'
                + '<body><h2>АКТ замечаний при приёмке объекта</h2><p class="sub">Дата: ' + dateStr + ' &bull; Замечаний: ' + remarks.length + '</p>'
                + '<table><tr><th style="width:28px">№</th><th style="width:110px">Фото</th><th>Описание нарушения</th><th style="width:110px">Место</th><th style="width:120px">Норматив</th><th style="width:72px">Дата</th></tr>'
                + rows + '</table><br/><table class="sig"><tr><td>Составил: ___________________</td><td>Проверил: ___________________</td></tr></table></body></html>';
            var blob = new Blob(['\ufeff' + doc], { type: 'application/msword' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'Замечания_' + dateStr.replace(/\./g, '-') + '.doc';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
            showToast('Файл выгружен');
        }

        /* Обработчики */
        fabBtn.addEventListener('click', openAddForm);
        $('btn-export').addEventListener('click', exportToDoc);
        $('btn-form-back').addEventListener('click', function() { showScreen('list'); });
        $('btn-detail-back').addEventListener('click', function() { showScreen('list'); });

        photoBlock.addEventListener('click', function() { inputCamera.click(); });
        $('photo-gallery-link').addEventListener('click', function(e) { e.stopPropagation(); inputGallery.click(); });

        function bindFileInput(input) {
            input.addEventListener('change', function() {
                if (!input.files[0]) return;
                compressImage(input.files[0], function(base64) {
                    if (base64) setPhotoPreview(base64);
                    else showToast('Ошибка обработки фото');
                });
                input.value = '';
            });
        }
        bindFileInput(inputCamera);
        bindFileInput(inputGallery);

        remarkForm.addEventListener('submit', function(e) { e.preventDefault(); saveRemark(); });

        $('btn-modal-cancel').addEventListener('click', function() { deleteModal.classList.remove('show'); deleteTargetId = null; });
        $('btn-modal-confirm').addEventListener('click', function() { if (deleteTargetId !== null) deleteRemark(deleteTargetId); deleteTargetId = null; deleteModal.classList.remove('show'); });
        deleteModal.addEventListener('click', function(e) { if (e.target === deleteModal) { deleteModal.classList.remove('show'); deleteTargetId = null; } });

        /* Инициализация */
        loadFromStorage();
        renderList();
    </script>
</body>
</html>
