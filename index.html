<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2C3E50">
    <meta name="apple-mobile-web-app-title" content="Приёмка">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Приёмка объекта</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root{--bg:#F5F0EB;--card:#FFF;--accent:#D35400;--accent-hover:#B8460A;--accent-light:#FDEBD0;--text:#2C3E50;--text-muted:#95A5A6;--border:#E8E0D8;--danger:#E74C3C;--danger-light:#FDEDEC;--header-bg:#2C3E50}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100dvh;width:100vw}
        body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,0,0,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.018) 1px,transparent 1px);background-size:36px 36px;pointer-events:none;z-index:0}
        .loading-screen{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .3s}
        .loading-screen.hide{opacity:0;pointer-events:none}
        .loading-spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .loading-text{font-size:14px;color:var(--text-muted);font-weight:600}
        .screen{position:fixed;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transform:translateY(14px);transition:opacity .26s,transform .26s;z-index:1}
        .screen.active{opacity:1;pointer-events:auto;transform:translateY(0);z-index:2}
        .app-header{background:var(--header-bg);color:#fff;padding:0 16px;height:56px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:10}
        .app-header h1{font-size:17px;font-weight:800;flex:1}
        .header-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;border:none;background:rgba(255,255,255,.1);color:#fff;cursor:pointer}
        .header-btn:active{background:rgba(255,255,255,.25)}
        .header-icon{font-size:20px!important}
        .status-bar{height:4px;background:var(--accent);flex-shrink:0}
        .counter-badge{background:var(--accent);color:#fff;font-size:11px;font-weight:800;padding:1px 8px;border-radius:20px;margin-left:6px}
        .screen-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:88px}
        .screen-content::-webkit-scrollbar{width:3px}
        .screen-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
        @keyframes cardSlideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        .remark-card{background:var(--card);border-radius:12px;padding:12px;margin-bottom:10px;display:flex;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.05);cursor:pointer;border:1px solid var(--border);animation:cardSlideIn .3s ease both}
        .remark-card:active{transform:scale(.98)}
        .remark-card .thumb-wrap{position:relative;width:84px;height:84px;flex-shrink:0}
        .remark-card .thumb{width:84px;height:84px;border-radius:8px;object-fit:cover;background:var(--bg)}
        .remark-card .thumb-badge{position:absolute;bottom:-4px;right:-4px;background:var(--accent);color:#fff;font-size:10px;font-weight:800;padding:2px 6px;border-radius:10px;border:2px solid var(--card)}
        .remark-card .info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
        .remark-card .num{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:2px}
        .remark-card .desc{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .remark-card .loc{font-size:12px;color:var(--text-muted);margin-top:4px;display:flex;align-items:center;gap:3px}
        .remark-card .loc .material-icons-round{font-size:14px}
        .fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:16px;background:var(--accent);color:#fff;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 18px rgba(211,84,0,.45);z-index:20}
        .fab:active{transform:scale(.9);background:var(--accent-hover)}
        .fab .material-icons-round{font-size:28px}
        .form-section{margin-bottom:18px}
        .form-label{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
        .form-label .material-icons-round{font-size:17px;color:var(--accent)}
        .form-input{width:100%;padding:11px 13px;border:2px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;color:var(--text);background:var(--card);outline:none}
        .form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(211,84,0,.1)}
        .form-input::placeholder{color:var(--text-muted)}
        textarea.form-input{resize:vertical;min-height:76px}
        .photo-block{border:2px dashed var(--border);border-radius:12px;padding:12px;text-align:center;cursor:pointer;position:relative;overflow:hidden;min-height:80px;transition:border-color .2s,background .2s}
        .photo-block:active{border-color:var(--accent);background:var(--accent-light)}
        .photo-block.has-photo{border-style:solid;border-color:var(--border)}
        .photo-placeholder{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text-muted);padding:20px 0}
        .photo-placeholder .material-icons-round{font-size:40px;color:var(--accent)}
        .photo-placeholder span{font-size:14px;font-weight:600}
        .photos-grid{display:flex;flex-wrap:wrap;gap:8px}
        .photos-grid-item{position:relative;width:70px;height:70px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
        .photos-grid-item img{width:100%;height:100%;object-fit:cover}
        .photos-grid-del{position:absolute;top:0;right:0;background:rgba(231,76,60,.9);color:#fff;border:none;width:20px;height:20px;font-size:16px;line-height:20px;text-align:center;cursor:pointer;border-bottom-left-radius:8px}
        .photos-grid-add{width:70px;height:70px;border:2px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted)}
        .photos-grid-add:active{border-color:var(--accent);color:var(--accent)}
        .save-btn{width:100%;padding:14px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;margin-top:4px}
        .save-btn:active{transform:scale(.98);background:var(--accent-hover)}
        .detail-photo{width:100%;border-radius:12px;margin-bottom:10px;display:block;max-height:70vh;object-fit:contain;background:var(--bg)}
        .detail-field{background:var(--card);border-radius:10px;padding:13px 14px;margin-bottom:8px;border:1px solid var(--border)}
        .detail-field .label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;display:flex;align-items:center;gap:4px}
        .detail-field .label .material-icons-round{font-size:14px}
        .detail-field .value{font-size:15px;font-weight:600;line-height:1.45}
        .detail-actions{display:flex;gap:10px;margin-top:18px}
        .detail-actions button{flex:1;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
        .detail-actions button:active{transform:scale(.97)}
        .btn-edit{background:var(--accent-light);color:var(--accent)}
        .btn-delete{background:var(--danger-light);color:var(--danger)}
        .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
        .empty-state .material-icons-round{font-size:60px;color:var(--border);margin-bottom:14px}
        .empty-state p{font-size:15px;color:var(--text-muted);font-weight:600;line-height:1.5}
        .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--header-bg);color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:600;z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1);white-space:nowrap;box-shadow:0 4px 18px rgba(0,0,0,.22)}
        .toast.show{transform:translateX(-50%) translateY(0)}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .2s}
        .modal-overlay.show{opacity:1;pointer-events:auto}
        .modal-box{background:var(--card);border-radius:16px;padding:24px;max-width:310px;width:100%;text-align:center}
        .modal-box h3{font-size:17px;font-weight:800;margin-bottom:6px}
        .modal-box p{font-size:13px;color:var(--text-muted);margin-bottom:18px}
        .modal-btns{display:flex;gap:10px}
        .modal-btns button{flex:1;padding:10px;border-radius:10px;border:none;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
        .modal-cancel{background:var(--bg);color:var(--text)}
        .modal-confirm{background:var(--danger);color:#fff}
        .bottom-sheet{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .2s}
        .bottom-sheet.show{opacity:1;pointer-events:auto}
        .bottom-sheet-content{position:absolute;bottom:0;left:0;right:0;background:var(--card);border-radius:16px 16px 0 0;padding:8px 0 16px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
        .bottom-sheet.show .bottom-sheet-content{transform:translateY(0)}
        .bottom-sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 12px}
        .menu-item{display:flex;align-items:center;gap:14px;padding:14px 20px;cursor:pointer;border:none;background:none;width:100%;font-family:inherit;font-size:15px;font-weight:600;color:var(--text);text-align:left;transition:background .15s}
        .menu-item:active{background:var(--bg)}
        .menu-item .material-icons-round{font-size:22px;color:var(--text-muted)}
        .menu-item.danger{color:var(--danger)}
        .menu-item.danger .material-icons-round{color:var(--danger)}
        .menu-sep{height:1px;background:var(--border);margin:4px 20px}
        .custom-cb{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
        .remark-card.sel .custom-cb{background:var(--accent);border-color:var(--accent)}
        .custom-cb .material-icons-round{font-size:16px;color:#fff;display:none}
        .remark-card.sel .custom-cb .material-icons-round{display:block}
        .remark-card.sel{background:var(--accent-light);border-color:var(--accent)}
        #header-select .header-btn-del{background:var(--danger)!important}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{transition-duration:.01ms!important;animation-duration:.01ms!important}}
    </style>
</head>
<body>
    <div class="loading-screen" id="loading-screen"><div class="loading-spinner"></div><div class="loading-text">Загрузка данных...</div></div>
    
    <div id="screen-list" class="screen active">
        <div class="status-bar"></div>
        <header class="app-header" id="header-normal">
            <span class="material-icons-round header-icon" style="color:var(--accent)">construction</span>
            <h1 id="list-title">Приёмка объекта</h1>
            <button class="header-btn" id="btn-select-mode" aria-label="Выбрать несколько"><span class="material-icons-round header-icon">checklist</span></button>
            <button class="header-btn" id="btn-export" aria-label="Выгрузить"><span class="material-icons-round header-icon">download</span></button>
            <button class="header-btn" id="btn-menu" aria-label="Меню"><span class="material-icons-round header-icon">more_vert</span></button>
        </header>
        <header class="app-header" id="header-select" style="display:none">
            <button class="header-btn" id="btn-exit-select" aria-label="Отмена"><span class="material-icons-round header-icon">close</span></button>
            <h1 id="select-title" style="font-size:15px; flex:1;">Выбрано: 0</h1>
            <button class="header-btn header-btn-del" id="btn-del-selected" aria-label="Удалить выбранные"><span class="material-icons-round header-icon">delete</span></button>
        </header>
        <div class="screen-content" id="list-content"></div>
        <button class="fab" id="btn-add" aria-label="Добавить замечание"><span class="material-icons-round">add</span></button>
    </div>
    
    <div id="screen-form" class="screen">
        <div class="status-bar"></div>
        <header class="app-header">
            <button class="header-btn" id="btn-form-back" aria-label="Назад"><span class="material-icons-round header-icon">arrow_back</span></button>
            <h1 id="form-title">Новое замечание</h1>
        </header>
        <div class="screen-content">
            <form id="remark-form" autocomplete="off">
                <div class="form-section">
                    <label class="form-label"><span class="material-icons-round">photo_camera</span> Фотографии с камеры</label>
                    <div class="photo-block" id="photo-block">
                        <div class="photo-placeholder" id="photo-placeholder">
                            <span class="material-icons-round">add_a_photo</span>
                            <span>Сделать снимок</span>
                        </div>
                        <div class="photos-grid" id="photos-grid" style="display:none;"></div>
                    </div>
                    <input type="file" id="input-camera" accept="image/*" capture="environment" multiple hidden>
                </div>
                <div class="form-section"><label class="form-label" for="input-desc"><span class="material-icons-round">report_problem</span> Описание нарушения</label><textarea class="form-input" id="input-desc" placeholder="Опишите выявленное нарушение..." rows="3"></textarea></div>
                <div class="form-section"><label class="form-label" for="input-loc"><span class="material-icons-round">place</span> Место обнаружения</label><input class="form-input" id="input-loc" type="text" placeholder="Этаж, помещение, зона..."></div>
                <div class="form-section"><label class="form-label" for="input-norm"><span class="material-icons-round">gavel</span> Нормативный документ</label><input class="form-input" id="input-norm" type="text" placeholder="СП, ГОСТ, СНиП, пункт..."></div>
                <button type="submit" class="save-btn" id="btn-save">Сохранить</button>
            </form>
        </div>
    </div>
    
    <div id="screen-detail" class="screen">
        <div class="status-bar"></div>
        <header class="app-header"><button class="header-btn" id="btn-detail-back" aria-label="Назад"><span class="material-icons-round header-icon">arrow_back</span></button><h1 id="detail-title">Замечание</h1></header>
        <div class="screen-content" id="detail-content"></div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <div class="modal-overlay" id="delete-modal"><div class="modal-box"><h3>Удалить замечание?</h3><p>Действие нельзя будет отменить</p><div class="modal-btns"><button class="modal-cancel" id="btn-modal-cancel">Отмена</button><button class="modal-confirm" id="btn-modal-confirm">Удалить</button></div></div></div>
    
    <div class="modal-overlay" id="clear-modal"><div class="modal-box"><h3 id="clear-modal-title">Удалить все замечания?</h3><p>Будет удалено замечаний: <span id="clear-count">0</span></p><div class="modal-btns"><button class="modal-cancel" id="btn-clear-cancel">Отмена</button><button class="modal-confirm" id="btn-clear-confirm">Удалить</button></div></div></div>
    
    <div class="bottom-sheet" id="bottom-sheet">
        <div class="bottom-sheet-content">
            <div class="bottom-sheet-handle"></div>
            <button class="menu-item" id="menu-export-html"><span class="material-icons-round">file_upload</span>Экспорт в HTML</button>
            <button class="menu-item" id="menu-import-html"><span class="material-icons-round">file_download</span>Импорт из HTML</button>
            <div class="menu-sep"></div>
            <button class="menu-item danger" id="menu-clear-all"><span class="material-icons-round">delete_sweep</span>Удалить все замечания</button>
        </div>
    </div>
    <input type="file" id="input-import-html" accept=".html,.htm" hidden>

    <script>
        if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){});}
        
        var DB_NAME='PriemkaDB',DB_VER=2,STORE='remarks',db=null, isMemoryMode=false;
        
        function openDB(){return new Promise(function(res,rej){try{var r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=function(e){var d=e.target.result;if(!d.objectStoreNames.contains(STORE))d.createObjectStore(STORE,{keyPath:'id'});};r.onsuccess=function(e){res(e.target.result);};r.onerror=function(){rej(r.error);};}catch(e){rej(e);}});}
        function dbGetAll(){return new Promise(function(res,rej){if(isMemoryMode){res([]);return;}try{var tx=db.transaction(STORE,'readonly'),r=tx.objectStore(STORE).getAll();r.onsuccess=function(){res(r.result||[]);};r.onerror=function(){rej(r.error);};}catch(e){rej(e);}});}
        function dbPut(item){return new Promise(function(res,rej){if(isMemoryMode){res();return;}try{var tx=db.transaction(STORE,'readwrite'),r=tx.objectStore(STORE).put(item);tx.oncomplete=function(){res();};r.onerror=function(){rej(r.error);};}catch(e){rej(e);}});}
        function dbPutMany(items){return new Promise(function(res,rej){if(isMemoryMode){res();return;}try{var tx=db.transaction(STORE,'readwrite'),store=tx.objectStore(STORE);for(var i=0;i<items.length;i++)store.put(items[i]);tx.oncomplete=function(){res();};tx.onerror=function(){rej(tx.error);};}catch(e){rej(e);}});}
        function dbClear(){return new Promise(function(res,rej){if(isMemoryMode){res();return;}try{var tx=db.transaction(STORE,'readwrite'),r=tx.objectStore(STORE).clear();tx.oncomplete=function(){res();};r.onerror=function(){rej(r.error);};}catch(e){rej(e);}});}
        function dbDelete(id){return new Promise(function(res,rej){if(isMemoryMode){res();return;}try{var tx=db.transaction(STORE,'readwrite'),r=tx.objectStore(STORE).delete(id);tx.oncomplete=function(){res();};r.onerror=function(){rej(r.error);};}catch(e){rej(e);}});}
        
        function migrateOld(){try{var o=localStorage.getItem('obj_remarks');if(!o)return Promise.resolve(0);var d=JSON.parse(o);if(!Array.isArray(d)||d.length===0){localStorage.removeItem('obj_remarks');return Promise.resolve(0);}return dbGetAll().then(function(ex){if(ex.length>0){localStorage.removeItem('obj_remarks');return 0;}var t=[];for(var i=0;i<d.length;i++){if(!d[i].photos) d[i].photos = d[i].photo ? [d[i].photo] : []; t.push(dbPut(d[i]));}return Promise.all(t).then(function(){localStorage.removeItem('obj_remarks');return d.length;});});}catch(e){try{localStorage.removeItem('obj_remarks');}catch(x){}return Promise.resolve(0);}}
        
        var remarks=[],editingId=null,currentPhotos=[],deleteTargetId=null,lastLocation='', isSelectMode=false, selectedIds=[], deleteActionType='single';
        var $=function(id){return document.getElementById(id);};
        var screenList=$('screen-list'),screenForm=$('screen-form'),screenDetail=$('screen-detail'),listContent=$('list-content'),detailContent=$('detail-content');
        var listTitle=$('list-title'),formTitle=$('form-title'),detailTitleEl=$('detail-title'),remarkForm=$('remark-form'),photoBlock=$('photo-block'),photoPlaceholder=$('photo-placeholder');
        var inputCamera=$('input-camera'),photosGrid=$('photos-grid');
        var inputDesc=$('input-desc'),inputLoc=$('input-loc'),inputNorm=$('input-norm'),btnSave=$('btn-save'),toastEl=$('toast'),deleteModal=$('delete-modal'),clearModal=$('clear-modal'),fabBtn=$('btn-add'),bottomSheet=$('bottom-sheet'),inputImportHtml=$('input-import-html');
        
        var headerNormal=$('header-normal'), headerSelect=$('header-select'), selectTitle=$('select-title');
        
        function showToast(m){toastEl.textContent=m;toastEl.classList.add('show');clearTimeout(showToast._t);showToast._t=setTimeout(function(){toastEl.classList.remove('show');},3000);}
        function formatDate(i){try{return new Date(i).toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'});}catch(e){return '—';}}
        function esc(t){var d=document.createElement('div');d.textContent=t||'';return d.innerHTML;}
        function genId(){return Date.now().toString(36)+'-'+Math.random().toString(36).substr(2,6);}
        function compressImage(f,cb){var r=new FileReader();r.onerror=function(){cb(null);};r.onload=function(e){var img=new Image();img.onerror=function(){cb(null);};img.onload=function(){var M=1200,w=img.width,h=img.height;if(w>M||h>M){if(w>h){h=Math.round(h*M/w);w=M;}else{w=Math.round(w*M/h);h=M;}}var c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',0.85));};img.src=e.target.result;};r.readAsDataURL(f);}
        function saveLastLoc(){try{localStorage.setItem('obj_last_loc',lastLocation);}catch(e){}}
        function loadLastLoc(){try{lastLocation=localStorage.getItem('obj_last_loc')||'';}catch(e){lastLocation='';}}
        
        function showScreen(n){
            screenList.classList.remove('active');screenForm.classList.remove('active');screenDetail.classList.remove('active');
            fabBtn.style.display=(n==='list' && !isSelectMode)?'flex':'none';
            if(n==='list'){screenList.classList.add('active');renderList();}
            else if(n==='form'){screenForm.classList.add('active');}
            else if(n==='detail'){screenDetail.classList.add('active');}
        }
        
        function enterSelectMode(){
            isSelectMode=true; selectedIds=[];
            if(headerNormal) headerNormal.style.display='none'; 
            if(headerSelect) headerSelect.style.display='flex';
            fabBtn.style.display='none'; updateSelectTitle(); renderList();
        }
        function exitSelectMode(){
            isSelectMode=false; selectedIds=[];
            if(headerNormal) headerNormal.style.display='flex'; 
            if(headerSelect) headerSelect.style.display='none';
            renderList();
        }
        function updateSelectTitle(){ if(selectTitle) selectTitle.textContent = 'Выбрано: ' + selectedIds.length; }
        function toggleSelect(id){
            var idx = selectedIds.indexOf(id);
            if(idx > -1) selectedIds.splice(idx, 1); else selectedIds.push(id);
            var cards = listContent.querySelectorAll('.remark-card');
            for(var i=0; i<cards.length; i++){
                if(cards[i].dataset.id === id) cards[i].classList.toggle('sel', selectedIds.indexOf(id) > -1);
            }
            updateSelectTitle();
        }
        function deleteSelected(){
            if(selectedIds.length===0){showToast('Выберите замечания');return;}
            deleteActionType='selected';
            $('clear-count').textContent=selectedIds.length;
            $('clear-modal-title').textContent='Удалить выбранные замечания?';
            clearModal.classList.add('show');
        }
        function performDeleteSelected(){
            var promises = [];
            for(var i=0; i<selectedIds.length; i++){
                var id = selectedIds[i];
                remarks = remarks.filter(function(r){ return r.id !== id; });
                promises.push(dbDelete(id));
            }
            Promise.all(promises).then(function(){
                showToast('Удалено: '+selectedIds.length);
                exitSelectMode();
            }).catch(function(){showToast('Ошибка удаления');});
        }

        function getDisplayNum(id){for(var i=0;i<remarks.length;i++){if(remarks[i].id===id)return i+1;}return '?';}
        
        function renderList(){
            if(remarks.length>0){listTitle.innerHTML='Приёмка объекта <span class="counter-badge">'+remarks.length+'</span>';}else{listTitle.textContent='Приёмка объекта';}
            if(remarks.length===0){listContent.innerHTML='<div class="empty-state"><span class="material-icons-round">assignment_late</span><p>Замечаний пока нет<br>Нажмите <strong>+</strong> для добавления</p></div>';return;}
            var h='';
            for(var i=remarks.length-1;i>=0;i--){
                var r=remarks[i],n=i+1;
                var photos = r.photos || [];
                var thumbSrc = photos.length > 0 ? photos[0] : '';
                var badge = photos.length > 1 ? '<div class="thumb-badge">+'+(photos.length-1)+'</div>' : '';
                var isSel = (isSelectMode && selectedIds.indexOf(r.id) > -1) ? ' sel' : '';
                var cbHtml = isSelectMode ? '<div class="custom-cb"><span class="material-icons-round">check</span></div>' : '';
                
                h+='<div class="remark-card'+isSel+'" data-id="'+r.id+'" style="animation-delay:'+((remarks.length-1-i)*40)+'ms">'
                    +cbHtml
                    +'<div class="thumb-wrap"><img class="thumb" src="'+thumbSrc+'" alt="" onerror="this.style.display=\'none\'">'+badge+'</div>'
                    +'<div class="info"><div class="num">Замечание #'+n+'</div><div class="desc">'+esc(r.description)+'</div><div class="loc"><span class="material-icons-round">place</span>'+esc(r.location)+'</div></div></div>';
            }
            listContent.innerHTML=h;
            var cards=listContent.querySelectorAll('.remark-card');
            for(var j=0;j<cards.length;j++){
                (function(c){
                    c.addEventListener('click',function(){
                        if(isSelectMode){ toggleSelect(c.dataset.id); }
                        else { openDetail(c.dataset.id); }
                    });
                })(cards[j]);
            }
        }
        
        function openDetail(id){
            var r=null;for(var i=0;i<remarks.length;i++){if(remarks[i].id===id){r=remarks[i];break;}}if(!r)return;
            detailTitleEl.textContent='Замечание #'+getDisplayNum(id);
            var photos = r.photos || [];
            var photosHtml = '';
            for(var p=0; p<photos.length; p++) { photosHtml += '<img class="detail-photo" src="'+photos[p]+'" alt="">'; }
            detailContent.innerHTML=photosHtml
                +'<div class="detail-field"><div class="label"><span class="material-icons-round">report_problem</span>Описание нарушения</div><div class="value">'+esc(r.description)+'</div></div>'
                +'<div class="detail-field"><div class="label"><span class="material-icons-round">place</span>Место обнаружения</div><div class="value">'+esc(r.location)+'</div></div>'
                +'<div class="detail-field"><div class="label"><span class="material-icons-round">gavel</span>Нормативный документ</div><div class="value">'+(esc(r.normative)||'—')+'</div></div>'
                +'<div class="detail-field"><div class="label"><span class="material-icons-round">calendar_today</span>Дата фиксации</div><div class="value">'+formatDate(r.createdAt)+'</div></div>'
                +'<div class="detail-actions"><button class="btn-edit" id="btn-edit-r"><span class="material-icons-round" style="font-size:18px">edit</span>Редактировать</button><button class="btn-delete" id="btn-del-r"><span class="material-icons-round" style="font-size:18px">delete</span>Удалить</button></div>';
            $('btn-edit-r').addEventListener('click',function(){openEditForm(id);});
            $('btn-del-r').addEventListener('click',function(){deleteTargetId=id;deleteModal.classList.add('show');});
            showScreen('detail');
        }
        
        function openAddForm(){editingId=null;currentPhotos=[];formTitle.textContent='Новое замечание';btnSave.textContent='Сохранить';resetForm();inputLoc.value=lastLocation;showScreen('form');}
        function openEditForm(id){
            var r=null;for(var i=0;i<remarks.length;i++){if(remarks[i].id===id){r=remarks[i];break;}}if(!r)return;
            editingId=id; currentPhotos = r.photos ? r.photos.slice() : [];
            formTitle.textContent='Редактирование';btnSave.textContent='Обновить';
            inputDesc.value=r.description;inputLoc.value=r.location;inputNorm.value=r.normative;
            renderFormPhotos(); showScreen('form');
        }
        function resetForm(){inputDesc.value='';inputLoc.value='';inputNorm.value='';currentPhotos=[];renderFormPhotos();}
        
        function renderFormPhotos(){
            if(currentPhotos.length === 0){
                photoPlaceholder.style.display = 'flex'; photosGrid.style.display = 'none'; photoBlock.classList.remove('has-photo');
            } else {
                photoPlaceholder.style.display = 'none'; photosGrid.style.display = 'flex'; photoBlock.classList.add('has-photo');
                var html = '';
                for(var i=0; i<currentPhotos.length; i++){ html += '<div class="photos-grid-item"><img src="'+currentPhotos[i]+'"><button type="button" class="photos-grid-del" data-idx="'+i+'">×</button></div>'; }
                html += '<div class="photos-grid-add" id="btn-add-more-photo"><span class="material-icons-round" style="font-size:28px">add</span></div>';
                photosGrid.innerHTML = html;
            }
        }
        
        function saveRemark(){
            var d=inputDesc.value.trim(),l=inputLoc.value.trim(),n=inputNorm.value.trim();
            if(currentPhotos.length===0){showToast('Сделайте хотя бы один снимок');return;}
            if(!d){showToast('Укажите описание нарушения');inputDesc.focus();return;}
            if(!l){showToast('Укажите место обнаружения');inputLoc.focus();return;}
            lastLocation=l;saveLastLoc();
            if(editingId!==null){
                var it=null;for(var i=0;i<remarks.length;i++){if(remarks[i].id===editingId){it=remarks[i];break;}}
                if(it){it.photos=currentPhotos.slice();it.description=d;it.location=l;it.normative=n;}
                dbPut(it).then(function(){showToast('Замечание обновлено');showScreen('list');}).catch(function(){showToast('Ошибка сохранения');});
            } else {
                var ni={id:genId(),photos:currentPhotos.slice(),description:d,location:l,normative:n,createdAt:new Date().toISOString()};
                remarks.push(ni);
                dbPut(ni).then(function(){showToast('Замечание #'+remarks.length+' добавлено');showScreen('list');}).catch(function(){remarks.pop();showToast('Ошибка сохранения');});
            }
        }
        
        function deleteRemark(id){var f=[];for(var i=0;i<remarks.length;i++){if(remarks[i].id!==id)f.push(remarks[i]);}remarks=f;dbDelete(id).then(function(){showToast('Замечание удалено');showScreen('list');}).catch(function(){showToast('Ошибка удаления');});}
        function clearAllRemarks(){dbClear().then(function(){remarks=[];showToast('Все замечания удалены');showScreen('list');}).catch(function(){showToast('Ошибка очистки');});}

        function exportToHtml(){
            if(remarks.length===0){showToast('Нет замечаний');return;}
            var ds=new Date().toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'}),t=remarks.length,tr='';
            for(var i=0;i<remarks.length;i++){
                var r=remarks[i], photos = r.photos || [];
                var ph='—'; if(photos.length>0){ ph=''; for(var p=0; p<photos.length; p++){ ph+='<img src="'+photos[p]+'" style="max-width:100%;max-height:150px;width:auto;height:auto;object-fit:contain;display:block;margin:0 auto 4px;border:1px solid #ccc;"/>'; } }
                tr+='<tr><td style="width:5%;text-align:center;vertical-align:middle;font-weight:bold;border:1px solid #000;padding:4px;">'+(i+1)+'</td><td style="width:20%;text-align:center;vertical-align:middle;border:1px solid #000;padding:4px;">'+ph+'</td><td style="width:33%;vertical-align:middle;border:1px solid #000;padding:4px;font-size:10pt;">'+esc(r.description)+'</td><td style="width:15%;vertical-align:middle;border:1px solid #000;padding:4px;">'+esc(r.location)+'</td><td style="width:19%;vertical-align:middle;border:1px solid #000;padding:4px;font-size:9pt;">'+(esc(r.normative)||'—')+'</td><td style="width:8%;text-align:center;vertical-align:middle;border:1px solid #000;padding:4px;font-size:9pt;">'+formatDate(r.createdAt)+'</td></tr>';
            }
            var html='<!DOCTYPE html><html><head><meta charset="utf-8"><title>Акт замечаний</title><style>@page{size:landscape;margin:10mm;}@media print{.no-print{display:none!important;}}body{font-family:"Times New Roman",Times,serif;font-size:11pt;color:#000;margin:10mm;}h1{text-align:center;font-size:15pt;margin-bottom:2mm;}.sub{text-align:center;font-size:10pt;color:#444;margin-bottom:5mm;}table{border-collapse:collapse;width:100%;}th{background-color:#D35400;color:#fff;font-size:9pt;font-weight:bold;text-align:center;border:1px solid #000;padding:5px 4px;}.sig{margin-top:10mm;width:100%;}.sig td{border:none;width:50%;padding:4mm 2mm;font-size:10pt;vertical-align:bottom;}.sig-line{border-bottom:1px solid #000;display:inline-block;width:140px;margin-left:4px;}.no-print{margin:8mm 0;text-align:center;}.no-print button{padding:10px 28px;font-size:12pt;font-family:"Times New Roman",serif;cursor:pointer;background:#D35400;color:#fff;border:none;border-radius:6px;}</style></head><body><h1>АКТ замечаний при приёмке объекта</h1><p class="sub">Дата формирования: '+ds+'&emsp;&emsp;Количество замечаний: '+t+'</p><table><tr><th style="width:5%">№</th><th style="width:20%">Фото</th><th style="width:33%">Описание нарушения</th><th style="width:15%">Место</th><th style="width:19%">Норматив</th><th style="width:8%">Дата</th></tr>'+tr+'</table><table class="sig"><tr><td>Составил: <span class="sig-line"></span></td><td>Проверил: <span class="sig-line"></span></td></tr></table><div class="no-print"><button onclick="window.print()">Печать / PDF</button></div></body></html>';
            var blob=new Blob([html],{type:'text/html;charset=utf-8'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='Замечания_'+ds.replace(/\./g,'-')+'.html';document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(function(){URL.revokeObjectURL(url);},1000);showToast('Файл HTML выгружен');
        }

        function importHtmlData(file){
            var reader = new FileReader();
            reader.onload = function(e){
                try {
                    var doc = new DOMParser().parseFromString(e.target.result, 'text/html');
                    var rows = doc.querySelectorAll('table tr');
                    var newRemarks = [];
                    for(var i=1; i<rows.length; i++){
                        var tds = rows[i].querySelectorAll('td');
                        if(tds.length < 6) continue;
                        var imgs = tds[1].querySelectorAll('img');
                        var photosArr = [];
                        for(var j=0; j<imgs.length; j++){var src = imgs[j].getAttribute('src');if(src && src.startsWith('data:image')) photosArr.push(src);}
                        if(photosArr.length === 0) continue;
                        var desc = tds[2].textContent.trim();
                        var loc = tds[3].textContent.trim();
                        var norm = tds[4].textContent.trim(); if(norm === '—') norm = '';
                        var dateStr = tds[5].textContent.trim();
                        var parts = dateStr.split('.'); var isoDate = new Date(parts[2], parts[1]-1, parts[0]).toISOString();
                        newRemarks.push({id: genId(), photos: photosArr, description: desc, location: loc, normative: norm, createdAt: isoDate});
                    }
                    if(newRemarks.length === 0){showToast('Не найдено данных');return;}
                    for(var k=0; k<newRemarks.length; k++) remarks.push(newRemarks[k]);
                    dbPutMany(remarks).then(function(){showToast('Импортировано: '+newRemarks.length);showScreen('list');}).catch(function(){showToast('Ошибка сохранения импорта');});
                } catch(err) { console.error(err); showToast('Ошибка чтения файла'); }
            };
            reader.readAsText(file);
        }

        fabBtn.addEventListener('click',openAddForm);
        $('btn-export').addEventListener('click',exportToHtml);
        $('btn-form-back').addEventListener('click',function(){showScreen('list');});
        $('btn-detail-back').addEventListener('click',function(){showScreen('list');});
        
        photoPlaceholder.addEventListener('click',function(){inputCamera.click();});
        photosGrid.addEventListener('click', function(e) {
            if (e.target.closest('.photos-grid-del')) { e.stopPropagation(); currentPhotos.splice(parseInt(e.target.closest('.photos-grid-del').dataset.idx), 1); renderFormPhotos(); }
            else if (e.target.closest('.photos-grid-add')) { e.stopPropagation(); inputCamera.click(); }
        });

        inputCamera.addEventListener('change',function(){
            if(!inputCamera.files.length) return;
            var processed = 0; var total = inputCamera.files.length;
            for(var i=0; i<total; i++){
                (function(file){ compressImage(file, function(b){ if(b) currentPhotos.push(b); processed++; if(processed === total) renderFormPhotos(); }); })(inputCamera.files[i]);
            }
            inputCamera.value='';
        });
        
        remarkForm.addEventListener('submit',function(e){e.preventDefault();saveRemark();});
        
        $('btn-modal-cancel').addEventListener('click',function(){deleteModal.classList.remove('show');deleteTargetId=null;});
        $('btn-modal-confirm').addEventListener('click',function(){if(deleteTargetId!==null)deleteRemark(deleteTargetId);deleteTargetId=null;deleteModal.classList.remove('show');});
        deleteModal.addEventListener('click',function(e){if(e.target===deleteModal){deleteModal.classList.remove('show');deleteTargetId=null;}});

        $('btn-clear-cancel').addEventListener('click',function(){clearModal.classList.remove('show'); deleteActionType='single';});
        $('btn-clear-confirm').addEventListener('click',function(){
            clearModal.classList.remove('show');
            if(deleteActionType === 'selected') { performDeleteSelected(); deleteActionType='single'; }
            else { clearAllRemarks(); }
        });
        clearModal.addEventListener('click',function(e){if(e.target===clearModal){clearModal.classList.remove('show'); deleteActionType='single';}});

        $('btn-select-mode').addEventListener('click', enterSelectMode);
        $('btn-exit-select').addEventListener('click', exitSelectMode);
        $('btn-del-selected').addEventListener('click', deleteSelected);

        $('btn-menu').addEventListener('click',function(){bottomSheet.classList.add('show');});
        bottomSheet.addEventListener('click',function(e){if(e.target===bottomSheet)bottomSheet.classList.remove('show');});
        $('menu-export-html').addEventListener('click',function(){bottomSheet.classList.remove('show');exportToHtml();});
        $('menu-import-html').addEventListener('click',function(){bottomSheet.classList.remove('show');inputImportHtml.click();});
        $('menu-clear-all').addEventListener('click',function(){bottomSheet.classList.remove('show');if(remarks.length===0){showToast('Замечаний нет');return;}deleteActionType='all';$('clear-count').textContent=remarks.length; $('clear-modal-title').textContent='Удалить все замечания?'; clearModal.classList.add('show');});
        
        inputImportHtml.addEventListener('change',function(){if(!inputImportHtml.files[0])return;importHtmlData(inputImportHtml.files[0]);inputImportHtml.value='';});

        openDB().then(function(d){db=d; return dbGetAll();}).then(function(data){remarks=data; return migrateOld();}).then(function(){return dbGetAll();}).then(function(data){remarks=data; loadLastLoc(); renderList(); var ls=$('loading-screen'); ls.classList.add('hide'); setTimeout(function(){ls.remove();},300);}).catch(function(err){console.warn("БД заблокирована. Режим памяти:", err); isMemoryMode = true; remarks=[]; loadLastLoc(); renderList(); var ls=$('loading-screen'); ls.classList.add('hide'); setTimeout(function(){ls.remove();},300);});
    </script>
</body>
</html>
